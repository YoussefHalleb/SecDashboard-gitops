apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  revisionHistoryLimit: 2
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: gcr.io/secdashboard-pfe/frontend:9bce4bed63812c9d07ceaf913f3ddec66082700e
          ports:
            - containerPort: 80
