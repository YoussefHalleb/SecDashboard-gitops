apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  revisionHistoryLimit: 2
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: gcr.io/secdashboard-pfe/backend:a76823b96d6fdce5b4d65654308bac655b69ac95
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: backend-secret
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
            - name: gcp-key
              mountPath: /secrets
              readOnly: true
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /secrets/gcp-key.json
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: uploads-pvc
        - name: gcp-key
          secret:
            secretName: gcp-key
